project:
  type: website
  output-dir: docs

execute:
  freeze: auto

website:
  title: "Bayesian Workflow book"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Case studies"
        href: casestudies.html
      - text: "Exercises"
        href: exercises.html
      - text: "Errata"
        href: errata.html
      - text: "Resources"
        href: resources.html
    right:
      - icon: github
        text: GitHub
  sidebar:
    style: "docked"
    contents:
      - section: "Case studies"
        contents:
          - text: "Sec 3.5: Bioassay"
          - text: "Ch 4: Modeling performance on a multiple choice exam"
          - text: "Sec 11.4 and 11.6: How many iterations to run and how many digits to report"
          - text: "Sec 12.3: Illustration of problematic posteriors"
          - text: "Sec 12.4: Declining exponentials"
          - text: "Ch 16: Simulated data of movie ratings"
          - text: "Ch 17: Sleep study: Prior specification and model checking"
          - text: "Ch 18: Nabiximols treatment efficiency"
          - text: "Ch 19: Sensitivity and specificity in coronavirus testing"
          - text: "Ch 20: Mixture model for time series competition"
          - text: "Ch 21: Stochastic learning in dogs -- brms"
          - text: "Ch 21: Stochastic learning in dogs -- Stan"
          - text: "Ch 22: Survival analysis and black cat adoptions"
          - text: "Ch 23: World Cup continuous vs discrete models"
          - text: "Ch 24: Roaches cross-validation model checking and comparison"
          - text: "Ch 25: Model building and expansion for golf putting"
          - text: "Ch 26: Sharks and model building with latent variables"
          - text: "Ch 27: Birthdays and time-series decomposition"
          - text: "Ch 28: Variable selection"
          - text: "Ch 29: Park rule: No vehicles in the park"
          - text: "Ch 30: Planetary motion: Computational challenge of multimodality"
          - text: "Ch 31: Simulation based calibration checking (SBC)"

format:
  html:
    encoding: UTF-8
    theme: readable
    css: _styles.css
    toc: true
    toc-depth: 2
    toc-location: right
    smooth-scroll: true
    embed-resources: true
    anchor-sections: true
    html-math-method: katex
